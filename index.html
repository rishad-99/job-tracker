<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Job-Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body class="bg-[#F8FAFC] grid justify-center">
    <section class="container mx-auto pt-12">
      <h1 class="text-[32px] text-[#002C5C] font-bold pb-5">
        Job Application Tracker
      </h1>
      <div class="counting-container flex gap-10">
        <div class="bg-white w-[300px] rounded-lg">
          <p class="text-[14px] font-medium text-[#323B49] px-5 pt-5 pb-2">
            Total
          </p>
          <h2
            id="total-count"
            class="px-5 text-[24px] font-bold text-[#002C5C] pb-5"
          >
            0
          </h2>
        </div>
        <div class="bg-white w-[300px] rounded-lg">
          <p class="text-[14px] font-medium text-[#323B49] px-5 pt-5 pb-2">
            Interview
          </p>
          <h2
            id="interview-count"
            class="px-5 text-[24px] font-bold text-[#10B981] pb-5"
          >
            0
          </h2>
        </div>
        <div class="bg-white w-[300px] rounded-lg">
          <p class="text-[14px] font-medium text-[#323B49] px-5 pt-5 pb-2">
            Rejected
          </p>
          <h2
            id="rejected-count"
            class="px-5 text-[24px] font-bold text-[#EF4444] pb-5"
          >
            0
          </h2>
        </div>
      </div>
      <hr class="border border-[#E6E7E9] my-[30px]" />
    </section>

    <section class="container mx-auto">
      <div class="grid justify-start">
        <h2
          id="view-title"
          class="text-[20px] font-semibold text-[#002C5C] pb-6"
        >
          All Jobs
        </h2>
        <div class="nav-menu flex gap-5">
          <button
            onclick="filterJobs('all')"
            class="nav-btn bg-[#3B82F6] text-white border border-[#F1F2F4] font-medium px-7 py-2.5 rounded-md cursor-pointer transition-all duration-300"
          >
            All
          </button>
          <button
            onclick="filterJobs('interview')"
            class="nav-btn bg-[#3B82F6] text-white border border-[#F1F2F4] font-medium px-7 py-2.5 rounded-md cursor-pointer transition-all duration-300"
          >
            Interview
          </button>
          <button
            onclick="filterJobs('rejected')"
            class="nav-btn bg-[#3B82F6] text-white border border-[#F1F2F4] font-medium px-7 py-2.5 rounded-md cursor-pointer transition-all duration-300"
          >
            All
          </button>
        </div>
      </div>
    </section>

    <section>
      <div
        id="job-list"
        class="application-container mt-4 pb-10 grid gap-10"
      ></div>
    </section>

    <script src="./script.js"></script>
  </body>
</html>
